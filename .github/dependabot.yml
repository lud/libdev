version: 2

updates:
  - package-ecosystem: mix
    directory: /
    schedule:
      interval: "daily"
      timezone: "Etc/UTC"
      time: "06:00"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 2
    groups:
      prod:
        dependency-type: production
      dev:
        dependency-type: development

  - package-ecosystem: "github-actions"
    directory: /
    schedule:
      interval: "daily"
      timezone: "Etc/UTC"
      time: "06:00"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 2
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"

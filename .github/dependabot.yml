version: 2

updates:
  - package-ecosystem: mix
    directory: /
    schedule:
      interval: "daily"
      timezone: "Etc/UTC"
      time: "06:00"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 1
    groups:
      all:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: /
    schedule:
      interval: "weekly"
      timezone: "Etc/UTC"
      time: "06:00"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 1
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
